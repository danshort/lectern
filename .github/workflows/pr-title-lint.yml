name: PR Title

# The repo squash-merges, so a PR's title becomes the commit subject on main —
# which is what release-please turns into a changelog line. This check enforces
# that PR titles are valid Conventional Commits so the generated changelog reads
# well and the version bump is correct.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional Commit types release-please understands. feat/fix drive
          # the changelog; the rest are valid but produce no release on their own.
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            perf
            style
            revert
          # Subject after the type, e.g. "feat: flag invalid specs in the index".
          subjectPattern: ^[A-Za-z].+[^.]$
          subjectPatternError: |
            The PR title subject must start with a letter and not end with a period.
            Example: "feat: flag invalid specs with an error marker in the index"
